<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BikeStop SG | AI Marketplace</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3198/3198336.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
</head>
<body>

    <div id="splash" class="splash-screen">
        <h1 class="logo-text">BIKESTOP.STORE</h1>
        <div class="loader-bar"></div>
    </div>

    <div id="loginPage" class="page" style="display:none;">
        <div class="auth-container">
            <div class="auth-card shadow-lg text-center">
                <h2 class="fw-bold mb-3">Welcome</h2>
                <p class="text-muted small">Log in to buy and sell premium bikes in Singapore.</p>
                <button onclick="loginGoogle()" class="btn btn-dark w-100 py-3 rounded-pill fw-bold mt-3">Continue with Google</button>
                <button onclick="showPage('homePage')" class="btn btn-link text-dark mt-3">Browse as Guest</button>
            </div>
        </div>
    </div>

    <div id="homePage" class="page" style="display:none;">
        <nav class="navbar navbar-dark bg-black sticky-top py-3">
            <div class="container d-flex justify-content-between">
                <a class="navbar-brand fw-bold" href="#" onclick="location.reload()">BIKESTOP</a>
                <button class="btn btn-danger rounded-pill px-4 fw-bold" onclick="toggleUpload()">+ SELL</button>
            </div>
        </nav>

        <div class="container mt-4">
            <input type="text" id="search" class="form-control glass-input mb-4" placeholder="Search carbon, trek, s-works..." onkeyup="render()">
            <div id="uploadSection" class="glass-card p-4 mb-4" style="display:none;">
                <h5 class="fw-bold">AI Bike Scanner</h5>
                <input type="text" id="bikeTitle" class="form-control mb-2" placeholder="Title">
                <input type="number" id="bikePrice" class="form-control mb-2" placeholder="Price (SGD)">
                <textarea id="bikeCondition" class="form-control mb-3" placeholder="AI detects material here..."></textarea>
                <input type="file" id="bikePhotos" class="form-control mb-3" multiple>
                <button onclick="aiUpload()" id="upBtn" class="btn btn-dark w-100 py-2 rounded-pill">Post Listing</button>
            </div>
            <div id="grid" class="row g-3 pb-5"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
