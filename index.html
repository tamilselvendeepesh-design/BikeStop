<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BikeStop SG</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .bike-img { height: 250px; object-fit: cover; border-radius: 8px 8px 0 0; }
        .navbar { background-color: #202124; }
        .btn-post { background-color: #ff4444; color: white; border-radius: 20px; padding: 5px 20px; }
        .chat-window { position: fixed; bottom: 0; right: 20px; width: 320px; height: 400px; display: none; flex-direction: column; background: white; z-index: 1000; border: 1px solid #ddd; }
        #msg-container { flex-grow: 1; overflow-y: auto; padding: 10px; background: #f8f9fa; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold">BIKESTOP SG</a>
        <button class="btn btn-post fw-bold" onclick="document.getElementById('uploadSection').style.display='block'">+ SELL</button>
    </div>
</nav>

<div class="container mt-4">
    <div class="row g-2 mb-4">
        <div class="col-8"><input type="text" id="search" class="form-control" placeholder="Search bikes..." onkeyup="render()"></div>
        <div class="col-4">
            <select id="sort" class="form-select" onchange="render()">
                <option value="new">Newest</option>
                <option value="low">Price: Low</option>
                <option value="high">Price: High</option>
            </select>
        </div>
    </div>

    <div id="uploadSection" class="card p-4 shadow mb-4" style="display:none;">
        <h3>Post a Bike</h3>
        <input type="text" id="title" class="form-control mb-2" placeholder="Bike Model">
        <input type="number" id="price" class="form-control mb-2" placeholder="Price (SGD)">
        <input type="file" id="photos" class="form-control mb-3" multiple accept="image/*">
        <button onclick="upload()" id="upBtn" class="btn btn-dark w-100">Publish Listing</button>
    </div>

    <div id="grid" class="row"></div>
</div>

<div id="chatBox" class="chat-window shadow rounded-top">
    <div class="bg-dark text-white p-2 d-flex justify-content-between">
        <span>Chat</span>
        <button class="btn-close btn-close-white" onclick="document.getElementById('chatBox').style.display='none'"></button>
    </div>
    <div id="msg-container"></div>
    <div class="p-2 border-top">
        <input type="text" id="chatMsg" class="form-control mb-1" placeholder="Type message...">
        <button class="btn btn-danger btn-sm w-100" onclick="sendChat()">Send</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

<script>
    // YOUR CONFIG
    const firebaseConfig = {
        apiKey: "AIzaSyB4GuZE6rpatln-LlOJE3z_h3fn1F6mxZg",
        authDomain: "bikestop-72fa7.firebaseapp.com",
        projectId: "bikestop-72fa7",
        storageBucket: "bikestop-72fa7.firebasestorage.app",
        messagingSenderId: "264513335139",
        appId: "1:264513335139:web:e2af3e5614b459fb28ed56",
        measurementId: "G-TTEC5PLHMC"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const IMGBB_KEY = "06caefaf913fb425144cf684fd50a034";

    let activeSeller = null;

    // UPLOAD
    async function upload() {
        const files = document.getElementById('photos').files;
        if (files.length > 10 || files.length === 0) return alert("Select 1-10 photos");
        
        const btn = document.getElementById('upBtn');
        btn.disabled = true; btn.innerText = "Uploading...";

        let urls = [];
        for (let f of files) {
            let fd = new FormData(); fd.append("image", f);
            let r = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {method:"POST", body:fd});
            let d = await r.json();
            urls.push(d.data.url);
        }

        await db.collection("bikes").add({
            title: document.getElementById('title').value,
            price: parseFloat(document.getElementById('price').value),
            images: urls,
            reports: 0,
            sellerId: "User_" + Math.floor(Math.random()*999),
            time: firebase.firestore.FieldValue.serverTimestamp()
        });
        location.reload();
    }

    // RENDER LISTINGS
    function render() {
        const s = document.getElementById('sort').value;
        const q = document.getElementById('search').value.toLowerCase();
        let ref = db.collection("bikes").where("reports", "<", 5);

        if (s === "low") ref = ref.orderBy("price", "asc");
        else if (s === "high") ref = ref.orderBy("price", "desc");
        else ref = ref.orderBy("time", "desc");

        ref.onSnapshot(snap => {
            let h = "";
            snap.forEach(doc => {
                const b = doc.data();
                if (b.title.toLowerCase().includes(q)) {
                    h += `<div class="col-md-4 col-6 mb-4">
                        <div class="card h-100 border-0 shadow-sm">
                            <img src="${b.images[0]}" class="bike-img">
                            <div class="card-body">
                                <h6 class="fw-bold m-0">${b.title}</h6>
                                <p class="text-danger fw-bold">$${b.price}</p>
                                <button class="btn btn-outline-dark btn-sm w-100 mb-1" onclick="startChat('${b.sellerId}')">Chat</button>
                                <button class="btn btn-light btn-sm w-100" onclick="db.collection('bikes').doc('${doc.id}').update({reports:firebase.firestore.FieldValue.increment(1)})">Report</button>
                            </div>
                        </div>
                    </div>`;
                }
            });
            document.getElementById('grid').innerHTML = h;
        });
    }

    // CHAT
    function startChat(id) {
        activeSeller = id;
        document.getElementById('chatBox').style.display = 'flex';
        loadChat();
    }

    async function sendChat() {
        const txt = document.getElementById('chatMsg').value;
        const bad = ["scam", "stupid"]; // Add more words here
        if (bad.some(w => txt.toLowerCase().includes(w))) return alert("Clean your language!");
        
        await db.collection("chats").add({ to: activeSeller, text: txt, time: Date.now() });
        document.getElementById('chatMsg').value = "";
    }

    function loadChat() {
        db.collection("chats").orderBy("time", "asc").onSnapshot(snap => {
            let h = "";
            snap.forEach(d => { if(d.data().to === activeSeller) h += `<div class="p-2 mb-1 bg-white small border rounded">${d.data().text}</div>`; });
            document.getElementById('msg-container').innerHTML = h;
            document.getElementById('msg-container').scrollTop = 9999;
        });
    }

    window.onload = render;
</script>
</body>
</html>
