<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BikeStop SG | AI Marketplace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
</head>
<body>

    <div id="splash">
        <h1 class="logo-text">BIKESTOP SG</h1>
    </div>

    <div id="loginPage" class="page container py-5 text-center">
        <div class="auth-card mx-auto shadow-lg p-4 mt-5">
            <h2 class="fw-bold mb-4">Start Riding</h2>
            <button class="btn btn-dark w-100 mb-3 py-2" onclick="loginGoogle()">Continue with Google</button>
            <input type="email" id="email" class="form-control mb-2" placeholder="Email">
            <input type="password" id="pass" class="form-control mb-2" placeholder="Password">
            <button class="btn btn-primary w-100" onclick="loginEmail()">Login / Sign Up</button>
            <div id="recaptcha-container" class="mt-3"></div>
            <button class="btn btn-link text-dark mt-3" onclick="showPage('homePage')">Browse as Guest</button>
        </div>
    </div>

    <div id="homePage" class="page">
        <nav class="navbar navbar-dark bg-black sticky-top">
            <div class="container">
                <a class="navbar-brand fw-bold">BIKESTOP SG</a>
                <button class="btn btn-danger rounded-pill px-4" onclick="toggleUpload()">+ SELL</button>
            </div>
        </nav>

        <div class="container mt-4">
            <div class="search-container mb-4">
                <input type="text" id="search" class="form-control form-control-lg rounded-pill" placeholder="Search brands, carbon, road bikes..." onkeyup="render()">
                <div id="ai-suggestion" class="small text-muted mt-2 ms-3"></div>
            </div>

            <div id="uploadSection" class="card p-4 shadow-sm mb-5 border-0" style="display:none; border-radius: 20px;">
                <h4 class="fw-bold">AI Listing Engine</h4>
                <input type="text" id="bikeTitle" class="form-control mb-2" placeholder="Brand & Model (e.g. specialized sl8)">
                <input type="number" id="bikePrice" class="form-control mb-2" placeholder="Price (SGD)">
                <textarea id="bikeCondition" class="form-control mb-2" placeholder="Describe condition, scratches, or frame health..."></textarea>
                <input type="file" id="bikePhotos" class="form-control mb-3" multiple accept="image/*">
                <button onclick="aiUpload()" id="upBtn" class="btn btn-dark w-100 py-2">Post Listing</button>
            </div>

            <div id="grid" class="row"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
