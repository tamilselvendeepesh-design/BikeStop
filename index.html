<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BikeStop SG | Premium Marketplace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; }
        /* Splash Screen */
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #fff; z-index: 9999; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s ease; }
        /* Modern Cards */
        .bike-card { border: none; border-radius: 15px; overflow: hidden; transition: transform 0.3s; background: white; }
        .bike-card:hover { transform: translateY(-10px); }
        /* Page Sections */
        .page { display: none; }
        .active { display: block; }
    </style>
</head>
<body>

<div id="splash">
    <h1 class="fw-bold">BIKESTOP SG</h1>
</div>

<div id="loginPage" class="page container py-5 mt-5 text-center">
    <div class="card p-5 shadow-lg border-0 mx-auto" style="max-width: 450px;">
        <h2 class="fw-bold mb-4">Welcome</h2>
        
        <button class="btn btn-outline-dark w-100 mb-3" onclick="loginGoogle()">Continue with Google</button>
        
        <input type="email" id="email" class="form-control mb-2" placeholder="Email Address">
        <input type="password" id="pass" class="form-control mb-3" placeholder="Password">
        <div class="d-grid gap-2">
            <button class="btn btn-dark" onclick="loginEmail()">Login with Password</button>
            <button class="btn btn-outline-secondary btn-sm" onclick="sendPasswordlessLink()">Email Passwordless Link</button>
            <button class="btn btn-link btn-sm" onclick="forgotPasswordEmail()">Forgot Password?</button>
        </div>

        <hr>

        <input type="tel" id="phone" class="form-control mb-2" placeholder="+65 1234 5678">
        <div id="recaptcha-container"></div>
        <button class="btn btn-success w-100 mb-2" onclick="sendOTP()">Send Phone OTP</button>
        <input type="text" id="otp" class="form-control mb-2" style="display:none;" placeholder="Enter 6-digit OTP">
        <button id="verifyOtpBtn" class="btn btn-primary w-100 mb-3" style="display:none;" onclick="verifyOTP()">Verify OTP</button>

        <button class="btn btn-link text-decoration-none" onclick="showPage('homePage')">Browse as Guest</button>
    </div>
</div>

<div id="homePage" class="page">
    <nav class="navbar navbar-dark bg-black py-3">
        <div class="container">
            <a class="navbar-brand fw-bold">BIKESTOP SG</a>
            <button class="btn btn-danger rounded-pill" onclick="showPage('uploadPage')">+ Sell</button>
        </div>
    </nav>
    <div class="container mt-4">
        <input type="text" class="form-control form-control-lg mb-4 rounded-pill shadow-sm" placeholder="Search carbon, road, sl8..." onkeyup="render()">
        <div id="grid" class="row"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

<script>
    // PASTE YOUR CONFIG HERE
    const firebaseConfig = { ... }; 
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // 1-SECOND SPLASH LOGIC
    setTimeout(() => {
        document.getElementById('splash').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('splash').style.display = 'none';
            showPage('loginPage');
        }, 500);
    }, 1000);

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
    }

    // --- LOGIN FUNCTIONS ---

    // 1. Google
    function loginGoogle() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).then(() => showPage('homePage'));
    }

    // 2. Email Passwordless
    function sendPasswordlessLink() {
        const email = document.getElementById('email').value;
        const actionCodeSettings = { url: window.location.href, handleCodeInApp: true };
        auth.sendSignInLinkToEmail(email, actionCodeSettings).then(() => alert("Verify link sent to email!"));
    }

    // 3. Phone OTP
    window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container');
    function sendOTP() {
        const phone = document.getElementById('phone').value;
        auth.signInWithPhoneNumber(phone, window.recaptchaVerifier).then(confirm => {
            window.confirmationResult = confirm;
            document.getElementById('otp').style.display = 'block';
            document.getElementById('verifyOtpBtn').style.display = 'block';
        });
    }
    function verifyOTP() {
        const code = document.getElementById('otp').value;
        window.confirmationResult.confirm(code).then(() => showPage('homePage'));
    }

    // 4. Forgot Password
    function forgotPasswordEmail() {
        const email = document.getElementById('email').value;
        auth.sendPasswordResetEmail(email).then(() => alert("Reset link sent!"));
    }
</script>
</body>
</html>
