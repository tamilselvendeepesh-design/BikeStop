<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BikeStop SG | AI Marketplace</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="icon-192.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
</head>
<body>

    <nav class="navbar navbar-dark bg-black sticky-top shadow-sm">
        <div class="container d-flex justify-content-between">
            <a class="navbar-brand fw-bold" href="#">BIKESTOP.STORE</a>
            <div class="d-flex gap-2">
                <button id="installBtn" class="btn btn-outline-light btn-sm rounded-pill" style="display:none;">Install App</button>
                <button class="btn btn-danger btn-sm rounded-pill px-3" onclick="toggleUpload()">+ SELL</button>
            </div>
        </div>
    </nav>

    <div id="homePage" class="container mt-4">
        <div class="search-container mb-4">
            <input type="text" id="search" class="form-control glass-input" placeholder="Search carbon, aero, trek..." onkeyup="render()">
        </div>

        <div id="uploadSection" class="glass-card p-4 mb-4" style="display:none;">
            <h5 class="fw-bold">List Your Bike</h5>
            <input type="text" id="bikeTitle" class="form-control mb-2" placeholder="Title">
            <input type="number" id="bikePrice" class="form-control mb-2" placeholder="Price (SGD)">
            <textarea id="bikeCondition" class="form-control mb-2" placeholder="AI scans this for materials..."></textarea>
            <input type="file" id="bikePhotos" class="form-control mb-3" multiple>
            <button onclick="aiUpload()" id="upBtn" class="btn btn-dark w-100 py-2">Post Listing</button>
        </div>

        <div id="grid" class="row g-3"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>

    <script>
        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
            .then(() => console.log("PWA Active"));
        }

        // Handle Install Prompt
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBtn').style.display = 'block';
        });

        document.getElementById('installBtn').addEventListener('click', () => {
            deferredPrompt.prompt();
            document.getElementById('installBtn').style.display = 'none';
        });
    </script>
</body>
</html>
