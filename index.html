<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BikeStop SG | Premium Marketplace</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
</head>
<body>

    <div id="splash" class="splash-screen">
        <h1 class="logo-text">BIKESTOP.STORE</h1>
        <div class="loader-line"></div>
    </div>

    <div id="loginPage" class="page-view" style="display:none;">
        <div class="auth-wrapper">
            <div class="auth-card shadow-lg text-center">
                <h2 class="fw-bold mb-2">Welcome</h2>
                <p class="text-muted small mb-4">The AI-powered bike marketplace.</p>
                <button id="googleBtn" class="btn btn-dark w-100 py-3 rounded-pill fw-bold">
                    Continue with Google
                </button>
                <button onclick="showPage('homePage')" class="btn btn-link text-dark mt-3 text-decoration-none">Browse as Guest</button>
            </div>
        </div>
    </div>

    <div id="homePage" class="page-view" style="display:none;">
        <nav class="navbar navbar-light sticky-top bg-white border-bottom py-3">
            <div class="container d-flex justify-content-between">
                <a class="navbar-brand fw-bold" href="#" onclick="location.reload()">BIKESTOP</a>
                <button class="btn btn-danger rounded-pill px-4 fw-bold" onclick="toggleUpload()">+ SELL</button>
            </div>
        </nav>

        <div class="container mt-4">
            <input type="text" id="search" class="form-control search-bar mb-4" placeholder="Search S-Works, Carbon, Trek..." onkeyup="render()">
            
            <div id="uploadSection" class="upload-card p-4 mb-4 shadow-sm" style="display:none;">
                <h5 class="fw-bold mb-3">Post a Listing</h5>
                <input type="text" id="bikeTitle" class="form-control mb-2" placeholder="Brand & Model">
                <input type="number" id="bikePrice" class="form-control mb-2" placeholder="Price (SGD)">
                <textarea id="bikeCondition" class="form-control mb-3" placeholder="Describe the bike (AI will detect Material)..."></textarea>
                <input type="file" id="bikePhotos" class="form-control mb-3" multiple>
                <button id="upBtn" class="btn btn-dark w-100 py-2 rounded-pill fw-bold">Post with AI Scanner</button>
            </div>

            <div id="grid" class="row g-3 pb-5"></div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
